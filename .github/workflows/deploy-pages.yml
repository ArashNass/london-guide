name: Deploy London Guide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build static site
        run: |
          mkdir -p _site
          cat site.part00 site.part01 site.part02 site.part03 site.part04 site.part05 \
            | base64 --decode \
            | tar -xz -C _site
          test -f _site/index.html
          test -f _site/restaurants/index.html
          test -f _site/assets/site.css
          test -f _site/assets/home-photo-rotator.js
          test -f _site/assets/site.js

      - name: Enhance landing page source
        run: |
          cp landing-motion.js _site/landing-motion.js
          if ! grep -q 'landing-motion.js' _site/index.html; then
            sed -i 's#</body>#<script src="/landing-motion.js" defer></script></body>#' _site/index.html
          fi
          test -s _site/landing-motion.js
          grep -q 'landing-motion.js' _site/index.html

      - name: Rename titles in deployed source
        run: |
          mkdir -p /tmp/repacked-site
          python scripts/rename_deployed_titles.py _site --parts-dir /tmp/repacked-site
          grep -q 'Wonder Wander' _site/index.html
          grep -q 'Sky High' _site/views/index.html
          grep -q 'Retail Therapy Zone' _site/shopping/index.html
          grep -q 'Rise & Dine' _site/breakfast/index.html
          grep -q 'Food for Your Soul' _site/restaurants/index.html
          grep -q 'Pint Stops' _site/pubs/index.html
          grep -q 'App Arsenal' _site/apps/index.html

      - name: Enable existing site photos
        run: |
          python scripts/cache_google_site_images.py _site
          test -f _site/assets/photo-loader.js

      - name: Add uploaded venue photos
        run: |
          mkdir -p _site/images
          cp "images/Food for your Soul/"*.jpg _site/images/
          cp "images/Stomach Satisfiers/"*.jpg _site/images/
          cp "images/Retail Therapy Zone/"*.jpg _site/images/
          cp "images/App Arsenal/"*.jpg _site/images/
          cp direct-image-test.js _site/direct-image-test.js
          find _site -type f -name '*.html' -exec sed -i 's#</body>#<script src="/direct-image-test.js"></script></body>#' {} +

      - name: Remove London Now widget
        run: |
          find _site -type f -name '*.html' -exec sed -i 's#<script src="/london-now\.js[^"]*"[^>]*></script>##g' {} +


      - name: Add London status widget
        run: |
          cp london-status.js _site/london-status.js
          if ! grep -q 'london-status.js' _site/index.html; then
            sed -i 's#</body>#<script src="/london-status.js" defer></script></body>#' _site/index.html
          fi
          test -s _site/london-status.js
      - name: Apply safe page cleanup
        run: |
          cp safe-page-cleanup.js _site/safe-page-cleanup.js
          find _site -type f -name '*.html' -exec sed -i 's#</body>#<script src="/safe-page-cleanup.js" defer></script></body>#' {} +
          test -s _site/safe-page-cleanup.js
          grep -q 'safe-page-cleanup.js' _site/index.html
          grep -q 'safe-page-cleanup.js' _site/restaurants/index.html

      - name: Add search metadata and discovery files
        run: |
          python scripts/enhance_seo.py _site
          grep -q 'rel="canonical"' _site/index.html
          test -s _site/robots.txt
          test -s _site/sitemap.xml

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Persist rebuilt deployed source archive
        run: |
          cp /tmp/repacked-site/site.part0* .
          git add site.part00 site.part01 site.part02 site.part03 site.part04 site.part05
          if git diff --cached --quiet; then
            echo "The deployed source archive already contains the latest landing-page design."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Persist modern landing page design"
            git push
          fi
