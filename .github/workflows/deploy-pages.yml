name: Deploy London Guide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build static site
        run: |
          mkdir -p _site
          cat site.part00 site.part01 site.part02 site.part03 site.part04 site.part05 \
            | base64 --decode \
            | tar -xz -C _site
          test -f _site/index.html
          test -f _site/restaurants/index.html
          test -f _site/assets/site.css
          test -f _site/assets/home-photo-rotator.js
          test -f _site/assets/site.js

      - name: Enable existing site photos
        run: |
          python scripts/cache_google_site_images.py _site
          test -f _site/assets/photo-loader.js

      - name: Add uploaded venue photos
        run: |
          mkdir -p _site/images
          cp "images/Food for your Soul/"*.jpg _site/images/
          cp "images/Stomach Satisfiers/"*.jpg _site/images/
          cp "images/Retail Therapy Zone/"*.jpg _site/images/
          cp "images/App Arsenal/"*.jpg _site/images/
          cp direct-image-test.js _site/direct-image-test.js
          find _site -type f -name '*.html' -exec sed -i 's#</body>#<script src="/direct-image-test.js"></script></body>#' {} +

      - name: Add London live homepage widget
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          cp london-now.js _site/london-now.js
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("_site/london-now.js")
          text = path.read_text()
          key = os.environ.get("UNSPLASH_ACCESS_KEY", "")
          text = text.replace("__UNSPLASH_ACCESS_KEY__", key)
          path.write_text(text)
          PY
          sed -i 's#</body>#<script src="/london-now.js" defer></script></body>#' _site/index.html
          test -s _site/london-now.js
          grep -q 'london-now.js' _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
