name: Deploy London Guide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build static site
        run: |
          mkdir -p _site
          cat site.part00 site.part01 site.part02 site.part03 site.part04 \
            | base64 --decode \
            | tar -xz -C _site
          test -f _site/index.html
          test -f _site/restaurants/index.html
          test -f _site/assets/site.css
          test -f _site/assets/site.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
