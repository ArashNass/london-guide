name: Deploy London Guide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build static site
        run: |
          mkdir -p _site
          cat site.part00 site.part01 site.part02 site.part03 site.part04 \
            | base64 --decode \
            | tar -xz -C _site
          test -f _site/index.html
          test -f _site/restaurants/index.html
          test -f _site/assets/site.css
          test -f _site/assets/site.js

      - name: Enable existing site photos
        run: |
          python scripts/cache_google_site_images.py _site
          test -f _site/assets/photo-loader.js

      - name: Add uploaded venue photos
        run: |
          mkdir -p _site/images
          cp "images/Food for your Soul/0d7e295df686fe1e8fe1ddf003a41794.jpg" _site/images/
          cp "images/Food for your Soul/182e732c1dbeb2ffc60b3a48e3bc7729.jpg" _site/images/
